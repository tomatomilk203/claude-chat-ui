<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Sessions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,500;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0e0b06;
  --sb:       #130f07;
  --border:   #2a2210;
  --hover:    #1f1a0d;
  --active:   #2a1e00;
  --amber:    #d97706;
  --amber-lo: rgba(217,119,6,.12);
  --text:     #e8dcc8;
  --muted:    #6b5e42;
  --dim:      #3d3322;
  --user-bg:  #1a1408;
  --ai-bg:    #110e06;
  --font-serif: 'Crimson Pro', Georgia, serif;
  --font-mono:  'Space Mono', monospace;
}

html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: var(--font-serif); }

/* Noise texture overlay */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 999; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: .4;
}

.app { display: flex; height: 100vh; }

/* ── Sidebar ── */
.sidebar {
  width: 280px; min-width: 280px;
  background: var(--sb);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
}

.sb-head {
  padding: 20px 16px 14px;
  border-bottom: 1px solid var(--border);
}
.sb-wordmark {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: .15em;
  color: var(--amber);
  text-transform: uppercase;
  margin-bottom: 12px;
}
.sb-search {
  position: relative;
}
.sb-search input {
  width: 100%;
  background: var(--hover);
  border: 1px solid var(--dim);
  border-radius: 4px;
  padding: 6px 10px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 11px;
  outline: none;
  transition: border-color .15s;
}
.sb-search input::placeholder { color: var(--muted); }
.sb-search input:focus { border-color: var(--amber); }

.session-list { flex: 1; overflow-y: auto; }
.session-list::-webkit-scrollbar { width: 3px; }
.session-list::-webkit-scrollbar-thumb { background: var(--dim); }

.s-item {
  padding: 12px 16px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background .1s;
  position: relative;
}
.s-item::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 2px; background: transparent;
  transition: background .1s;
}
.s-item:hover { background: var(--hover); }
.s-item.active { background: var(--active); }
.s-item.active::before { background: var(--amber); }

.s-title {
  font-size: 14px;
  font-weight: 500;
  line-height: 1.35;
  color: var(--text);
  margin-bottom: 5px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.s-foot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
}
.s-project {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--amber);
  opacity: .6;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.s-time {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  white-space: nowrap;
  flex-shrink: 0;
}

.empty { padding: 32px 16px; text-align: center; color: var(--muted); font-size: 13px; font-family: var(--font-mono); }

/* Group */
.group-head {
  display: flex; align-items: center; gap: 7px;
  padding: 8px 14px;
  cursor: pointer;
  background: var(--sb);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 1;
  transition: background .1s;
}
.group-head:hover { background: var(--hover); }
.group-head.has-active { background: #1a1400; }
.group-arrow { font-size: 9px; color: var(--muted); flex-shrink: 0; width: 10px; }
.group-name {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--amber);
  flex: 1;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.group-count {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--muted);
  background: var(--dim);
  padding: 1px 6px;
  border-radius: 10px;
  flex-shrink: 0;
}
.s-count { font-family: var(--font-mono); font-size: 10px; color: var(--dim); }
.group-edit { font-size: 11px; color: var(--dim); opacity: 0; transition: opacity .15s; cursor: pointer; padding: 2px 4px; }
.group-head:hover .group-edit { opacity: 1; }
.group-edit:hover { color: var(--amber); }

/* ── Main ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

/* Header */
.chat-head {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  min-height: 68px;
}
.head-info { flex: 1; min-width: 0; }
.head-title {
  font-size: 17px;
  font-weight: 600;
  line-height: 1.3;
  color: var(--text);
  margin-bottom: 3px;
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.head-meta {
  display: flex;
  gap: 12px;
  align-items: center;
}
.head-project {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--amber);
  opacity: .7;
}
.head-count {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--muted);
}

.head-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

.btn-resume {
  display: flex; align-items: center; gap: 7px;
  padding: 9px 18px;
  background: var(--amber);
  border: none; border-radius: 4px;
  color: #0e0b06;
  font-family: var(--font-mono);
  font-size: 12px; font-weight: 700;
  letter-spacing: .05em;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
  white-space: nowrap;
}
.btn-resume:hover { opacity: .88; }
.btn-resume:active { transform: scale(.97); }
.btn-resume:disabled { opacity: .3; cursor: not-allowed; }
.btn-resume svg { width: 13px; height: 13px; fill: #0e0b06; }

.btn-copy {
  padding: 9px 12px;
  background: transparent;
  border: 1px solid var(--dim);
  border-radius: 4px;
  color: var(--muted);
  font-family: var(--font-mono);
  font-size: 11px;
  cursor: pointer;
  transition: border-color .15s, color .15s;
  white-space: nowrap;
}
.btn-copy:hover { border-color: var(--amber); color: var(--amber); }

.btn-new {
  padding: 9px 14px;
  background: transparent;
  border: 1px solid var(--dim);
  border-radius: 4px;
  color: var(--muted);
  font-family: var(--font-mono);
  font-size: 11px;
  cursor: pointer;
  transition: border-color .15s, color .15s;
}
.btn-new:hover { border-color: var(--amber); color: var(--amber); }

/* Toast */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--amber); color: #0e0b06;
  font-family: var(--font-mono); font-size: 12px;
  padding: 8px 18px; border-radius: 4px;
  opacity: 0; pointer-events: none;
  transition: opacity .2s, transform .2s;
  z-index: 1000;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Messages */
.messages {
  flex: 1; overflow-y: auto;
  padding: 24px;
  display: flex; flex-direction: column; gap: 0;
}
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: var(--dim); }

/* Welcome */
.welcome {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; color: var(--muted); text-align: center;
}
.welcome-glyph {
  font-size: 48px; opacity: .15; line-height: 1;
  font-family: var(--font-mono);
}
.welcome h2 { font-size: 20px; font-weight: 500; color: var(--muted); font-family: var(--font-mono); letter-spacing: .1em; }
.welcome p { font-size: 14px; max-width: 280px; line-height: 1.7; font-family: var(--font-mono); font-size: 11px; }

/* Message items */
.msg {
  display: flex;
  gap: 0;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
}
.msg:last-child { border-bottom: none; }

.msg-label {
  width: 60px; min-width: 60px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: .08em;
  padding-top: 2px;
  flex-shrink: 0;
}
.msg.user .msg-label { color: var(--amber); }
.msg.assistant .msg-label { color: var(--muted); }

.msg-body { flex: 1; min-width: 0; font-size: 16px; line-height: 1.7; }

/* Markdown */
.msg-body h1,.msg-body h2,.msg-body h3 { font-weight: 600; margin: 12px 0 6px; font-size: 16px; }
.msg-body h1:first-child,.msg-body h2:first-child,.msg-body h3:first-child { margin-top: 0; }
.msg-body p { margin-bottom: 8px; }
.msg-body p:last-child { margin-bottom: 0; }
.msg-body ul,.msg-body ol { padding-left: 20px; margin-bottom: 8px; }
.msg-body li { margin-bottom: 3px; }
.msg-body code:not(pre code) {
  background: var(--hover); border: 1px solid var(--dim);
  border-radius: 3px; padding: 1px 5px;
  font-family: var(--font-mono); font-size: 13px;
  color: var(--amber);
}
.msg-body pre {
  background: #080600; border: 1px solid var(--dim);
  border-radius: 4px; padding: 14px; margin: 8px 0;
  overflow-x: auto;
}
.msg-body pre code {
  font-family: var(--font-mono); font-size: 12px;
  color: #c8b89a; background: none; border: none; padding: 0;
}
.msg-body strong { font-weight: 600; color: #f0e6d2; }
.msg-body a { color: var(--amber); }
.msg-body blockquote { border-left: 2px solid var(--dim); padding-left: 14px; color: var(--muted); margin: 8px 0; }
.msg-body table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 14px; }
.msg-body th,.msg-body td { border: 1px solid var(--dim); padding: 6px 10px; }
.msg-body th { background: var(--hover); font-family: var(--font-mono); font-size: 12px; }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sb-head">
      <div class="sb-wordmark">Claude Sessions</div>
      <div class="sb-search">
        <input type="text" placeholder="search…" oninput="filter(this.value)">
      </div>
    </div>
    <div class="session-list" id="list">
      <div class="empty">loading…</div>
    </div>
  </div>

  <div class="main">
    <div class="chat-head" id="head">
      <div class="head-info">
        <div class="head-title" id="headTitle">セッションを選択</div>
        <div class="head-meta">
          <span class="head-project" id="headProject"></span>
          <span class="head-count" id="headCount"></span>
        </div>
      </div>
      <div class="head-actions">
        <button class="btn-new" onclick="newChat()">+ New</button>
        <button class="btn-copy" id="btnCopy" onclick="copyId()" style="display:none">Copy ID</button>
        <button class="btn-resume" id="btnResume" onclick="resume()" disabled>
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          Terminal で再開
        </button>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="welcome">
        <div class="welcome-glyph">_</div>
        <h2>SESSION LOG</h2>
        <p>左のリストからセッションを選ぶと<br>会話履歴が表示されます</p>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- New Chat Modal -->
<div id="newModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;backdrop-filter:blur(4px)">
  <div style="background:#181408;border:1px solid var(--dim);border-radius:6px;padding:28px;width:340px;display:flex;flex-direction:column;gap:16px;">
    <div style="font-family:var(--font-mono);font-size:12px;letter-spacing:.1em;color:var(--amber);text-transform:uppercase;">New Session</div>
    <div>
      <div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-bottom:8px;">プロジェクト名（任意）</div>
      <input id="newNameInput" type="text"
        placeholder="例: sns-bot、unity-game…"
        style="width:100%;background:var(--hover);border:1px solid var(--dim);border-radius:4px;padding:9px 12px;color:var(--text);font-family:var(--font-mono);font-size:13px;outline:none;"
        onkeydown="if(event.key==='Enter')confirmNew();if(event.key==='Escape')document.getElementById('newModal').style.display='none'">
    </div>
    <div style="font-family:var(--font-mono);font-size:11px;color:var(--muted);line-height:1.6;">
      名前をつけると <code style="color:var(--amber);background:var(--hover);padding:1px 5px;border-radius:3px;">sessions/名前/</code> フォルダを作成してそこで起動します。
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button onclick="document.getElementById('newModal').style.display='none'"
        style="padding:8px 14px;background:transparent;border:1px solid var(--dim);border-radius:4px;color:var(--muted);font-family:var(--font-mono);font-size:11px;cursor:pointer;">
        キャンセル
      </button>
      <button onclick="confirmNew()"
        style="padding:8px 18px;background:var(--amber);border:none;border-radius:4px;color:#0e0b06;font-family:var(--font-mono);font-size:11px;font-weight:700;cursor:pointer;">
        開く ↗
      </button>
    </div>
  </div>
</div>

<script>
marked.setOptions({ breaks: true, gfm: true });

let sessions = [], currentId = null, currentFilter = '';

async function load() {
  const r = await fetch('/api/sessions');
  sessions = await r.json();
  render(sessions);
}

// 折りたたみ状態を保持
const collapsed = new Set();

function render(list) {
  const el = document.getElementById('list');
  if (!list.length) { el.innerHTML = '<div class="empty">no sessions</div>'; return; }

  // プロジェクトでグループ化
  const groups = {};
  for (const s of list) {
    const key = s.project || '~';
    if (!groups[key]) groups[key] = [];
    groups[key].push(s);
  }

  // 最終更新が新しい順にグループ並べ替え
  const sortedGroups = Object.entries(groups).sort((a, b) =>
    b[1][0].last_timestamp.localeCompare(a[1][0].last_timestamp)
  );

  el.innerHTML = sortedGroups.map(([proj, items]) => {
    const isOpen = !collapsed.has(proj);
    const activeInGroup = items.some(s => s.id === currentId);
    return `
      <div class="group">
        <div class="group-head ${activeInGroup?'has-active':''}" onclick="toggleGroup('${esc(proj)}')">
          <span class="group-arrow">${isOpen ? '▾' : '▸'}</span>
          <span class="group-name">${esc(proj)}</span>
          <span class="group-count">${items.length}</span>
          <span class="group-edit" onclick="event.stopPropagation();renameGroup('${esc(items[0].project_raw)}','${esc(proj)}')" title="リネーム">✎</span>
        </div>
        <div class="group-body" style="display:${isOpen?'block':'none'}">
          ${items.map(s => `
            <div class="s-item ${s.id===currentId?'active':''}" onclick="open_('${s.id}')" data-id="${s.id}">
              <div class="s-title">${esc(s.title)}</div>
              <div class="s-foot">
                <span class="s-time">${reltime(s.last_timestamp)}</span>
                <span class="s-count">${s.message_count}件</span>
              </div>
            </div>`).join('')}
        </div>
      </div>`;
  }).join('');
}

function toggleGroup(proj) {
  if (collapsed.has(proj)) collapsed.delete(proj);
  else collapsed.add(proj);
  render(currentFilter ? sessions.filter(s =>
    s.title.toLowerCase().includes(currentFilter) ||
    s.project.toLowerCase().includes(currentFilter)
  ) : sessions);
}

function filter(q) {
  currentFilter = q.toLowerCase();
  render(currentFilter ? sessions.filter(s =>
    s.title.toLowerCase().includes(currentFilter) ||
    s.project.toLowerCase().includes(currentFilter)
  ) : sessions);
}

async function open_(id) {
  document.querySelectorAll('.s-item').forEach(e => e.classList.remove('active'));
  document.querySelector(`[data-id="${id}"]`)?.classList.add('active');
  currentId = id;

  const r    = await fetch(`/api/sessions/${id}`);
  const data = await r.json();
  const s    = sessions.find(x => x.id === id);

  document.getElementById('headTitle').textContent   = s?.title || id;
  document.getElementById('headProject').textContent = s?.project || '';
  document.getElementById('headCount').textContent   = `${data.messages.length} messages`;
  document.getElementById('btnResume').disabled      = false;
  document.getElementById('btnCopy').style.display   = '';

  const msgsEl = document.getElementById('messages');
  msgsEl.innerHTML = '';
  for (const m of data.messages) {
    const el    = document.createElement('div');
    el.className = `msg ${m.role}`;
    const label  = m.role === 'user' ? 'YOU' : 'AI';
    const body   = m.role === 'assistant'
      ? marked.parse(m.content || '')
      : `<p>${esc(m.content||'').replace(/\n/g,'<br>')}</p>`;
    el.innerHTML = `<div class="msg-label">${label}</div><div class="msg-body">${body}</div>`;
    msgsEl.appendChild(el);
  }
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

async function resume() {
  if (!currentId) return;
  const r = await fetch(`/api/resume/${currentId}`, {method:'POST'});
  const d = await r.json();
  if (d.ok) {
    toast('ターミナルで再開しました ↗');
  } else {
    // wt.exe がなければコマンドをコピー
    copyCmd();
    toast('wt.exe が見つかりません。コマンドをコピーしました');
  }
}

function newChat() {
  document.getElementById('newModal').style.display = 'flex';
  document.getElementById('newNameInput').value = '';
  setTimeout(() => document.getElementById('newNameInput').focus(), 50);
}

async function confirmNew() {
  const name = document.getElementById('newNameInput').value.trim();
  document.getElementById('newModal').style.display = 'none';
  const r = await fetch('/api/new', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({name})
  });
  const d = await r.json();
  if (d.ok) {
    toast(`「${name||'新規'}」を開きました ↗`);
    setTimeout(load, 2000);
  } else {
    navigator.clipboard.writeText('claude');
    toast('コマンドをコピーしました: claude');
  }
}

async function renameGroup(raw, current) {
  const name = prompt(`「${current}」の表示名を変更:`, current);
  if (name === null) return;
  await fetch('/api/alias', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({raw, display: name})
  });
  await load();
  toast('プロジェクト名を変更しました');
}

function copyId() {
  if (!currentId) return;
  navigator.clipboard.writeText(currentId);
  toast('Session ID をコピーしました');
}

function copyCmd() {
  if (!currentId) return;
  navigator.clipboard.writeText(`claude --resume ${currentId}`);
}

function toast(msg, duration=2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function reltime(ts) {
  if (!ts) return '';
  const d = (Date.now() - new Date(ts)) / 1000;
  if (d < 60) return 'just now';
  if (d < 3600) return `${Math.floor(d/60)}m ago`;
  if (d < 86400) return `${Math.floor(d/3600)}h ago`;
  return `${Math.floor(d/86400)}d ago`;
}

// Auto-refresh every 30s
load();
setInterval(load, 30000);
</script>
</body>
</html>
